[build]
  command = "pnpm install && pnpm --filter @vitatekh/web build"
  publish  = "apps/web/.next"

[build.environment]
  NODE_VERSION            = "20"
  PNPM_VERSION            = "9"
  NEXT_TELEMETRY_DISABLED = "1"

[functions]
  node_bundler = "nft"

[[plugins]]
  package = "@netlify/plugin-nextjs"
