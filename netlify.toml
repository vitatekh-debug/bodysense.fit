# ║  ARCHIVADO — Proyecto migrado a Vercel                      ║
# ║  Mantener como referencia / rollback de emergencia.         ║
# ║  Configuración activa: /vercel.json                         ║
# ╚══════════════════════════════════════════════════════════════╝

[build]
  command = "pnpm install && pnpm --filter @vitatekh/web build"
  publish  = "apps/web/.next"

[build.environment]
  NODE_VERSION            = "20"
  PNPM_VERSION            = "9"
  NEXT_TELEMETRY_DISABLED = "1"
  # ⚠️  NEXT_PUBLIC_SUPABASE_URL y NEXT_PUBLIC_SUPABASE_ANON_KEY
  #     NO se ponen aquí (quedarían en git).
  #     Añádelas en Netlify UI → Site configuration → Environment variables:
  #       NEXT_PUBLIC_SUPABASE_URL   = https://pgvfieqbisbwqcezlail.supabase.co
  #       NEXT_PUBLIC_SUPABASE_ANON_KEY = <tu anon key de .env.local>

[functions]
  node_bundler = "nft"

# ── HTTP Headers ─────────────────────────────────────────────────────────────
# HTML y páginas: revalidar siempre (no cachear en CDN ni browser).
# Así el nuevo código de server components llega inmediatamente al usuario.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Assets estáticos de Next.js ya tienen hash en el nombre de archivo.
# Cacheamos 1 año — cuando cambia el código el nombre del archivo cambia
# y el navegador descarga la nueva versión automáticamente.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fuentes e imágenes públicas: caché larga pero revalidable.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[plugins]]
  package = "@netlify/plugin-nextjs"
