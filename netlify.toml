[build]
  # pnpm install desde la raíz para resolver workspace packages (@vitatekh/shared)
  # luego ejecuta el build solo del paquete web
  command = "pnpm install --frozen-lockfile && pnpm --filter @vitatekh/web build"
  publish  = "apps/web/.next"

[build.environment]
  NODE_VERSION            = "20"
  PNPM_VERSION            = "9"
  NEXT_TELEMETRY_DISABLED = "1"

# Next.js 14 con SSR requiere el plugin oficial de Netlify
# Netlify lo instala automáticamente al detectar Next.js,
# pero declararlo aquí lo fija a la versión correcta.
[[plugins]]
  package = "@netlify/plugin-nextjs"
